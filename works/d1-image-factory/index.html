<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像自動生成ツール — コードでデザインを量産(体験デモ)</title>
<meta name="description" content="SVGをコードで組み、文字や色を差し替えてサムネ・証明書・名札を量産。CSVから一括生成も。">
<style>
  :root{--bg:#f4f7f9;--card:#fff;--ink:#16202e;--sub:#5a6a80;--line:#e2e8f1;--teal:#0f766e;--teal2:#0d9488;--gold:#d9a441;--navy:#12203c}
  @media(prefers-color-scheme:dark){:root{--bg:#0e1520;--card:#18212f;--ink:#e9eef6;--sub:#93a3b8;--line:#283446;--navy:#0a1226}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}
  header{background:radial-gradient(ellipse at 80% -20%,rgba(217,164,65,.4),transparent 60%),var(--navy);color:#fff;padding:26px 20px}
  header .wrap{max-width:1000px;margin:0 auto}
  header .badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:3px 14px;font-size:.75rem;margin-bottom:10px}
  header h1{font-size:clamp(1.3rem,3.4vw,1.8rem);font-weight:800}
  header p{opacity:.9;margin-top:6px;font-size:.9rem}
  main{max-width:1000px;margin:0 auto;padding:22px 20px 70px}
  .note{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:10px 14px;font-size:.85rem;margin-bottom:18px}
  @media(prefers-color-scheme:dark){.note{background:#332711;border-color:#7c5806;color:#fcd34d}}
  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer}
  .tab.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .cols{display:grid;grid-template-columns:300px 1fr;gap:18px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  label{display:block;font-size:.8rem;color:var(--sub);margin:12px 0 4px}
  input[type=text]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:.9rem}
  .swatches{display:flex;gap:8px;margin-top:6px}
  .sw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}
  .sw.on{border-color:var(--ink)}
  .btn{background:linear-gradient(135deg,#14b8a6,#0f766e);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-weight:700;cursor:pointer;font-size:.95rem;margin-top:16px;width:100%}
  #preview{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;overflow:hidden}
  #preview svg{width:100%;height:auto;display:block;border-radius:8px}
  .bulk{margin-top:16px;font-size:.83rem;color:var(--sub);background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:14px}
  .bulk b{color:var(--teal2)}
  footer{background:#0a101e;color:#7688a3;font-size:.75rem;text-align:center;padding:24px;line-height:2}
</style>
</head>
<body>
<header><div class="wrap">
  <span class="badge">画像自動生成・体験デモ</span>
  <h1>コードでデザインを量産する</h1>
  <p>文字と色を差し替えるだけで、サムネ・証明書・名札を生成。SVGで作るので文字は崩れず、CSVから一括生成もできます。</p>
</div></header>
<main>
  <div class="note">お絵描きAIではなく、図形と文字を正確に組む方式です。だから「名前だけ変えて100枚」のような<strong>データ量産</strong>が得意。下で文字を打つと、右の画像がリアルタイムに変わります。PNG保存もできます。</div>

  <div class="tabs">
    <button class="tab on" data-t="thumb">サムネイル</button>
    <button class="tab" data-t="cert">証明書・賞状</button>
    <button class="tab" data-t="badge">名札・バッジ</button>
  </div>

  <div class="cols">
    <div class="panel">
      <div id="fields"></div>
      <label>カラー</label>
      <div class="swatches" id="sw"></div>
      <button class="btn" id="dl">🖼 PNGでダウンロード</button>
    </div>
    <div>
      <div id="preview"></div>
      <div class="bulk">💡 <b>一括生成</b>：CSV（例：氏名の一覧）を渡せば、この画像を<b>全員分まとめて自動生成</b>できます。イベントの名札100枚、受講者の修了証、商品サムネの量産などに。</div>
    </div>
  </div>
</main>
<footer>※ ポートフォリオ用の体験デモです。内容は架空のサンプルです。</footer>
<script>
"use strict";
const $=s=>document.querySelector(s);
const COLORS=["#0f766e","#12203c","#b45309","#7c3aed","#be123c","#0369a1"];
let state={t:"thumb", color:"#0f766e", v:{
  thumb:{title:"Excel作業を自動化", sub:"実務6年 × AI｜ボタン1つで数分に"},
  cert:{name:"山田 太郎", title:"修了証", body:"あなたは業務効率化研修の全課程を修了したことを証します"},
  badge:{event:"Tech Conference 2026", name:"鈴木 花子", org:"ほころびデザイン"}
}};

const FIELDS={
  thumb:[["title","大見出し"],["sub","小見出し"]],
  cert:[["title","タイトル"],["name","お名前"],["body","本文"]],
  badge:[["event","イベント名"],["name","お名前"],["org","所属・肩書き"]]
};
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
const FONT="'Hiragino Sans','Hiragino Kaku Gothic ProN','Arial Unicode MS',sans-serif";

function svgThumb(v,c){return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
<rect width="1200" height="750" fill="#12203c"/>
<rect width="1200" height="750" fill="${c}" opacity="0.16"/>
<rect x="0" y="0" width="16" height="750" fill="${c}"/>
<rect x="80" y="120" rx="22" width="150" height="50" fill="${c}"/>
<text x="104" y="154" font-size="26" font-weight="700" fill="#fff" font-family="${FONT}">SAMPLE</text>
<text x="78" y="360" font-size="96" font-weight="800" fill="#fff" font-family="${FONT}">${esc(v.title)}</text>
<text x="82" y="450" font-size="40" fill="${c}" font-family="${FONT}" filter="brightness(1.6)">${esc(v.sub)}</text>
<text x="80" y="690" font-size="26" fill="#93a3b8" font-family="${FONT}">業務自動化 × Web制作</text>
</svg>`;}
function svgCert(v,c){return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
<rect width="1200" height="750" fill="#fbfaf6"/>
<rect x="30" y="30" width="1140" height="690" fill="none" stroke="${c}" stroke-width="4"/>
<rect x="46" y="46" width="1108" height="658" fill="none" stroke="${c}" stroke-width="1.5"/>
<text x="600" y="180" font-size="64" font-weight="800" fill="${c}" text-anchor="middle" font-family="${FONT}" letter-spacing="8">${esc(v.title)}</text>
<line x1="450" y1="210" x2="750" y2="210" stroke="${c}" stroke-width="2"/>
<text x="600" y="360" font-size="70" font-weight="800" fill="#222" text-anchor="middle" font-family="${FONT}">${esc(v.name)} 殿</text>
<text x="600" y="460" font-size="30" fill="#444" text-anchor="middle" font-family="${FONT}">${esc(v.body)}</text>
<text x="600" y="620" font-size="26" fill="#666" text-anchor="middle" font-family="${FONT}">2026年7月4日　ほころびデザイン</text>
</svg>`;}
function svgBadge(v,c){return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
<rect width="1200" height="750" fill="#fff"/>
<rect width="1200" height="180" fill="${c}"/>
<text x="600" y="112" font-size="42" font-weight="700" fill="#fff" text-anchor="middle" font-family="${FONT}">${esc(v.event)}</text>
<text x="600" y="420" font-size="120" font-weight="800" fill="#16202e" text-anchor="middle" font-family="${FONT}">${esc(v.name)}</text>
<text x="600" y="540" font-size="40" fill="${c}" text-anchor="middle" font-family="${FONT}">${esc(v.org)}</text>
<rect x="0" y="690" width="1200" height="60" fill="${c}" opacity="0.12"/>
</svg>`;}
const GEN={thumb:svgThumb,cert:svgCert,badge:svgBadge};

function render(){
  $("#preview").innerHTML=GEN[state.t](state.v[state.t],state.color);
}
function buildFields(){
  const f=FIELDS[state.t], v=state.v[state.t];
  $("#fields").innerHTML=f.map(([k,label])=>`<label>${label}</label><input type="text" data-k="${k}" value="${esc(v[k])}">`).join("");
  $("#fields").querySelectorAll("input").forEach(inp=>inp.addEventListener("input",e=>{state.v[state.t][e.target.dataset.k]=e.target.value; render();}));
}
$("#sw").innerHTML=COLORS.map(c=>`<span class="sw${c===state.color?' on':''}" data-c="${c}" style="background:${c}"></span>`).join("");
$("#sw").querySelectorAll(".sw").forEach(s=>s.onclick=()=>{state.color=s.dataset.c; $("#sw").querySelectorAll(".sw").forEach(x=>x.classList.toggle("on",x===s)); render();});
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x===t));
  state.t=t.dataset.t; buildFields(); render();
});
$("#dl").onclick=()=>{
  const svg=$("#preview svg");
  const xml=new XMLSerializer().serializeToString(svg);
  const b64=btoa(unescape(encodeURIComponent(xml)));
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement("canvas"); cv.width=1200; cv.height=750;
    const ctx=cv.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,1200,750); ctx.drawImage(img,0,0,1200,750);
    const a=document.createElement("a"); a.href=cv.toDataURL("image/png"); a.download=state.t+".png"; a.click();
  };
  img.src="data:image/svg+xml;base64,"+b64;
};
buildFields(); render();
</script>
</body>
</html>
