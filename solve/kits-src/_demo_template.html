<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ — 体験版</title>
<style>
  :root{--bg:#FAFAF8;--surface:#fff;--ink:#1A1D21;--ink2:#56606C;--ink3:#7A8490;
    --line:rgba(20,24,30,.1);--line2:rgba(20,24,30,.16);--accent:#0F766E;--accent2:#0B5F58;
    --soft:rgba(15,118,110,.1);--aline:rgba(15,118,110,.28)}
  @media (prefers-color-scheme:dark){:root{--bg:#0B0E11;--surface:#12171D;--ink:#E9EDF2;--ink2:#A2AEBB;--ink3:#7C8896;--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.16);--accent:#14B8A6;--accent2:#2DD4BF;--soft:rgba(45,212,191,.12);--aline:rgba(45,212,191,.3)}}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.85;padding:clamp(1.2rem,5vw,3rem)}
  .wrap{max-width:720px;margin:0 auto}
  .kick{font-size:.72rem;font-weight:700;letter-spacing:.2em;color:var(--accent2);text-transform:uppercase}
  h1{font-size:clamp(1.4rem,4vw,2rem);line-height:1.5;margin:.6rem 0 1rem}
  .lead{color:var(--ink2);margin-bottom:1.6rem}
  .demo{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface)}
  .bar{padding:.8rem 1.1rem;border-bottom:1px solid var(--line);background:rgba(0,0,0,.02);font-size:.76rem;color:var(--ink3);letter-spacing:.02em}
  .btnwrap{padding:1.4rem;text-align:center}
  button{font:inherit;font-weight:700;font-size:.95rem;padding:.9em 1.7em;border:none;border-radius:11px;background:var(--accent);color:#fff;cursor:pointer}
  button:disabled{opacity:.7;cursor:default}
  .count{margin-top:.7rem;font-size:.82rem;color:var(--ink2)}
  .count b{color:var(--accent2)}
  .stage{padding:1.1rem}
  table{width:100%;border-collapse:collapse;font-size:.84rem}
  th,td{padding:.5rem .7rem;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--ink3);font-size:.72rem}
  .blur td{filter:blur(3.5px);opacity:.5}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  .card{border:1px solid var(--line2);border-radius:10px;padding:.9rem;background:rgba(0,0,0,.02)}
  .card .n{font-size:.68rem;color:var(--ink3)}.card .to{font-weight:600;margin:.3rem 0}.card .amt{color:var(--accent2);font-weight:700}
  .rec{border:1px solid var(--line2);border-radius:10px;padding:.7rem .9rem;background:rgba(0,0,0,.02);margin-bottom:.6rem}
  .rec .h{display:flex;justify-content:space-between;font-size:.86rem}.rec .s{margin-top:.4rem;display:flex;gap:.4rem;flex-wrap:wrap}
  .rec .s span{font-size:.72rem;color:var(--accent2);background:var(--soft);border:1px solid var(--aline);border-radius:6px;padding:.15rem .5rem}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
  @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
  .tile{border:1px solid var(--line2);border-radius:10px;overflow:hidden;background:rgba(0,0,0,.02)}
  .tile .b{height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2))}.tile .body{padding:.5rem .6rem}.tile .nm{font-size:.8rem;font-weight:600}.tile .ro{font-size:.68rem;color:var(--ink3)}
  .trans{display:flex;flex-direction:column;gap:.6rem;font-size:.88rem}
  .tl{display:grid;grid-template-columns:auto 1fr;gap:.7rem}.tl .m{font-size:.72rem;color:var(--ink3)}.tl .w{font-weight:600;color:var(--accent2);margin-right:.4em}
  .lock{margin-top:.4rem;border:1px dashed var(--aline);background:var(--soft);border-radius:12px;padding:1.1rem 1.2rem;text-align:center;display:none}
  .lock.on{display:block}.lock .t{font-weight:700}.lock .r{margin-top:.5rem;color:var(--ink2);font-size:.85rem}
  .next{margin-top:1.5rem;padding:1.1rem 1.2rem;border:1px solid var(--aline);border-radius:12px;background:var(--soft);font-size:.9rem}
  .next b{color:var(--accent2)}
  footer{margin-top:2rem;font-size:.75rem;color:var(--ink3);text-align:center;line-height:2}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick">LIVE DEMO — 体験版（サンプルは架空）</div>
  <h1>__H1__</h1>
  <p class="lead">下のボタンで、実際に動きます。ただし途中で止まります。続きは、あなたの本物のデータで。</p>
  <div class="demo">
    <div class="bar">サンプルデータ（すべて架空）</div>
    <div class="btnwrap"><button id="run">__BTN__</button><div class="count" id="count" style="display:none"></div></div>
    <div class="stage" id="stage" style="display:none"></div>
    <div class="lock" id="lock"><div class="t" id="lockT"></div><div class="r" id="lockR"></div></div>
  </div>
  <div class="next">
    続きは、あなたの本物の作業でお見せします。<br>
    <b>同梱の「発注テンプレ.txt」をコピーして送るだけ</b>で、相談がはじまります（ご提案・お見積りまで無料）。
  </div>
  <footer>サンプルの会社名・数値はすべて架空です。／ 綻 流夢（ほころび るうむ）</footer>
</div>
<script>
var CFG = __CONFIG__;
var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
var run=document.getElementById("run"),stage=document.getElementById("stage"),count=document.getElementById("count"),lock=document.getElementById("lock");
run.addEventListener("click",function(){
  run.disabled=true;run.textContent=CFG.runningLabel||"処理中…";stage.style.display="";count.style.display="";
  (RUN[CFG.type]||RUN.table)();
});
function finish(){run.textContent="体験はここまで";document.getElementById("lockT").textContent=CFG.lockTitle;document.getElementById("lockR").textContent=CFG.lockReason;lock.classList.add("on");}
function stream(items,stopAt,add,label,total,done){
  var i=0,n=Math.min(stopAt,items.length);
  function tick(){if(i>=n){count.innerHTML=label(stopAt)+' <b>残り '+(total-stopAt).toLocaleString("ja-JP")+'</b>';done();return;}add(items[i],i);i++;count.innerHTML=label(i);reduce?tick():setTimeout(tick,260);}
  if(reduce){while(i<n){add(items[i],i);i++;}count.innerHTML=label(n)+' <b>残り '+(total-stopAt).toLocaleString("ja-JP")+'</b>';done();}else tick();
}
var RUN={
  table:function(){var t=document.createElement("table");t.innerHTML="<thead><tr>"+CFG.columns.map(function(c){return"<th>"+c+"</th>"}).join("")+"</tr></thead><tbody></tbody>";stage.appendChild(t);var tb=t.querySelector("tbody");
    stream(CFG.rows,CFG.stopAt,function(r){var tr=document.createElement("tr");tr.innerHTML=r.map(function(v){return"<td>"+v+"</td>"}).join("");tb.appendChild(tr);},function(n){return"収集 "+n+" 件"},CFG.total,function(){CFG.rows.slice(CFG.stopAt,CFG.stopAt+2).forEach(function(r){var tr=document.createElement("tr");tr.className="blur";tr.innerHTML=r.map(function(v){return"<td>"+v+"</td>"}).join("");tb.appendChild(tr);});finish();});},
  invoice:function(){var g=document.createElement("div");g.className="cards";stage.appendChild(g);stream(CFG.cards,CFG.stopAt,function(c){var d=document.createElement("div");d.className="card";d.innerHTML='<div class="n">'+c.no+'</div><div class="to">'+c.to+'</div><div class="amt">'+c.amount+'</div>';g.appendChild(d);},function(n){return"作成 "+n+" 社"},CFG.total,finish);},
  reception:function(){var b=document.createElement("div");stage.appendChild(b);stream(CFG.entries,CFG.stopAt,function(e){var d=document.createElement("div");d.className="rec";d.innerHTML='<div class="h"><b>'+e.name+'</b><span>'+e.when+'</span></div><div class="s">'+e.steps.map(function(s){return"<span>"+s+"</span>"}).join("")+'</div>';b.appendChild(d);},function(n){return"自動処理 "+n+" 件"},CFG.total,finish);},
  grid:function(){var g=document.createElement("div");g.className="grid";stage.appendChild(g);stream(CFG.tiles,CFG.stopAt,function(t){var d=document.createElement("div");d.className="tile";d.innerHTML='<div class="b"></div><div class="body"><div class="nm">'+t.name+'</div><div class="ro">'+t.role+'</div></div>';g.appendChild(d);},function(n){return"生成 "+n+" 枚"},CFG.total,finish);},
  transcribe:function(){var b=document.createElement("div");b.className="trans";stage.appendChild(b);var li=0;
    (function nx(){if(li>=CFG.lines.length){count.innerHTML='サンプル冒頭（約30%）まで <b>残りは録音の続き</b>';finish();return;}var ln=CFG.lines[li];var row=document.createElement("div");row.className="tl";row.innerHTML='<span class="m">'+ln.t+'</span><span><span class="w">'+ln.who+'</span><span class="x"></span></span>';b.appendChild(row);var x=row.querySelector(".x");count.innerHTML="変換中… "+ln.t;if(reduce){x.textContent=ln.text;li++;nx();return;}var ci=0;(function ty(){if(ci<ln.text.length){ci=Math.min(ci+2,ln.text.length);x.textContent=ln.text.slice(0,ci);setTimeout(ty,34);}else{li++;setTimeout(nx,170);}})();})();}
};
</script>
</body>
</html>
