<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="82%" cy="8%" r="60%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#14181E" fill-opacity="0.05"/>
    </pattern>
    <style>
      .jp{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;}
      .mono{font-family:'Helvetica Neue',Arial,sans-serif;}
    </style>
  </defs>

  <rect width="1200" height="630" fill="#FAFAF8"/>
  <rect width="1200" height="470" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- ブランド -->
  <g transform="translate(80,74)">
    <rect width="60" height="60" rx="14" fill="#0F766E"/>
    <g fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" transform="translate(0,0) scale(0.94)">
      <path d="M20 44 C24 34, 40 34, 44 24" opacity="0.55" stroke-dasharray="0.1 8.4"/>
      <path d="M32 34 C26 28, 26 20, 32 15"/>
      <path d="M32 34 C38 28, 38 20, 32 15"/>
      <path d="M32 34 C32 27, 32 21, 32 15" opacity="0.7"/>
    </g>
    <circle cx="30" cy="33" r="2.4" fill="#fff"/>
    <text x="78" y="27" class="jp" font-size="27" font-weight="700" fill="#1A1D21" letter-spacing="3">綻 流夢</text>
    <text x="78" y="52" class="jp" font-size="17" fill="#7A8490" letter-spacing="2">ほころび るうむ ／ 業務自動化 × Web制作</text>
  </g>

  <!-- オーバーライン -->
  <g transform="translate(82,222)">
    <rect y="-11" width="34" height="2" fill="#0F766E" opacity="0.5"/>
    <text x="48" y="-5" class="mono" font-size="19" font-weight="600" fill="#0B5F58" letter-spacing="6">BUSINESS AUTOMATION × WEB</text>
  </g>

  <!-- 見出し -->
  <text x="80" y="322" class="jp" font-size="76" font-weight="700" fill="#1A1D21" letter-spacing="1">その手作業、</text>
  <text x="80" y="424" class="jp" font-size="76" font-weight="700" fill="#0F766E" letter-spacing="1">来月から消せます。</text>

  <!-- サブ -->
  <text x="82" y="482" class="jp" font-size="25" fill="#56606C" letter-spacing="1">Excel・GAS・Webの業務自動化を、壊れない作りで。</text>

  <!-- 数値ピル -->
  <g transform="translate(80,536)">
    <g>
      <rect width="188" height="58" rx="12" fill="#fff" stroke="#0F766E" stroke-opacity="0.28"/>
      <text x="22" y="26" class="mono" font-size="26" font-weight="700" fill="#0B5F58">9</text>
      <text x="46" y="26" class="jp" font-size="16" fill="#56606C">作品</text>
      <text x="22" y="46" class="jp" font-size="13" fill="#7A8490">動くサンプル実績</text>
    </g>
    <g transform="translate(208,0)">
      <rect width="188" height="58" rx="12" fill="#fff" stroke="#0F766E" stroke-opacity="0.28"/>
      <text x="22" y="26" class="mono" font-size="26" font-weight="700" fill="#0B5F58">6</text>
      <text x="46" y="26" class="jp" font-size="16" fill="#56606C">年</text>
      <text x="22" y="46" class="jp" font-size="13" fill="#7A8490">Excel VBA 実務経験</text>
    </g>
    <g transform="translate(416,0)">
      <rect width="230" height="58" rx="12" fill="#fff" stroke="#0F766E" stroke-opacity="0.28"/>
      <text x="22" y="26" class="mono" font-size="26" font-weight="700" fill="#0B5F58">0.024</text>
      <text x="112" y="26" class="jp" font-size="16" fill="#56606C">秒</text>
      <text x="22" y="46" class="jp" font-size="13" fill="#7A8490">最速処理（実測・2千ファイル）</text>
    </g>
  </g>
</svg>
