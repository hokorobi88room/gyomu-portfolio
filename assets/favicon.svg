<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="綻 流夢">
  <rect width="64" height="64" rx="15" fill="#0F766E"/>
  <!-- 「綻ぶ」=ほどけて花開く をモチーフにした抽象マーク -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round">
    <!-- 開いた縫い目(ほどけ) -->
    <path d="M20 44 C24 34, 40 34, 44 24" opacity=".55" stroke-dasharray="0.1 8.4"/>
    <!-- 開花の3枚 -->
    <path d="M32 34 C26 28, 26 20, 32 15"/>
    <path d="M32 34 C38 28, 38 20, 32 15"/>
    <path d="M32 34 C32 27, 32 21, 32 15" opacity=".7"/>
  </g>
  <circle cx="32" cy="35" r="2.6" fill="#FFFFFF"/>
</svg>
